<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f6faf7"/>

  <text x="80" y="70" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#173328">
    System Architecture Overview
  </text>
  <text x="80" y="105" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4f6b5e">
    High-level process view of the current workflow
  </text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#355949"/>
    </marker>
  </defs>

  <rect x="80" y="180" width="180" height="100" rx="14" fill="#ffffff" stroke="#a8c1b3" stroke-width="2"/>
  <text x="170" y="225" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#173328">User</text>
  <text x="170" y="252" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#557063">Uploads and views</text>

  <rect x="340" y="130" width="260" height="210" rx="16" fill="#ffffff" stroke="#a8c1b3" stroke-width="2"/>
  <text x="470" y="175" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#173328">Frontend</text>
  <rect x="375" y="200" width="190" height="42" rx="10" fill="#edf6f0" stroke="#c8d9cf"/>
  <text x="470" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">Web UI</text>
  <rect x="375" y="255" width="190" height="42" rx="10" fill="#edf6f0" stroke="#c8d9cf"/>
  <text x="470" y="282" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">Authentication</text>
  <rect x="375" y="310" width="190" height="42" rx="10" fill="#edf6f0" stroke="#c8d9cf"/>
  <text x="470" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">Upload + Viewer</text>

  <rect x="680" y="130" width="280" height="210" rx="16" fill="#ffffff" stroke="#a8c1b3" stroke-width="2"/>
  <text x="820" y="175" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#173328">Backend</text>
  <rect x="715" y="200" width="210" height="42" rx="10" fill="#eef3fb" stroke="#cad8ec"/>
  <text x="820" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">API Server</text>
  <rect x="715" y="255" width="210" height="42" rx="10" fill="#eef3fb" stroke="#cad8ec"/>
  <text x="820" y="282" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">Validation</text>
  <rect x="715" y="310" width="210" height="42" rx="10" fill="#eef3fb" stroke="#cad8ec"/>
  <text x="820" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">Processing Control</text>

  <rect x="1040" y="110" width="260" height="220" rx="16" fill="#ffffff" stroke="#a8c1b3" stroke-width="2"/>
  <text x="1170" y="155" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#173328">Modal Server</text>
  <rect x="1075" y="185" width="190" height="42" rx="10" fill="#fff3df" stroke="#e6d0a2"/>
  <text x="1170" y="212" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">Point Cloud Processing</text>
  <rect x="1075" y="240" width="190" height="42" rx="10" fill="#fff3df" stroke="#e6d0a2"/>
  <text x="1170" y="267" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">BIM Reconstruction</text>
  <rect x="1075" y="295" width="190" height="42" rx="10" fill="#fff3df" stroke="#e6d0a2"/>
  <text x="1170" y="322" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">IFC + Export</text>

  <rect x="1040" y="400" width="260" height="170" rx="16" fill="#ffffff" stroke="#a8c1b3" stroke-width="2"/>
  <text x="1170" y="445" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#173328">Local Fallback</text>
  <rect x="1075" y="475" width="190" height="42" rx="10" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="1170" y="502" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">Processing Pipeline</text>
  <rect x="1075" y="530" width="190" height="42" rx="10" fill="#fbeaea" stroke="#e7c3c3"/>
  <text x="1170" y="557" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#173328">IFC + Export</text>

  <rect x="340" y="460" width="620" height="220" rx="16" fill="#ffffff" stroke="#a8c1b3" stroke-width="2"/>
  <text x="650" y="505" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#173328">Supabase</text>
  <rect x="380" y="545" width="150" height="70" rx="12" fill="#edf6f0" stroke="#c8d9cf"/>
  <text x="455" y="586" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#173328">Auth Service</text>
  <rect x="575" y="545" width="150" height="70" rx="12" fill="#edf6f0" stroke="#c8d9cf"/>
  <text x="650" y="586" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#173328">Database</text>
  <rect x="770" y="545" width="150" height="70" rx="12" fill="#edf6f0" stroke="#c8d9cf"/>
  <text x="845" y="586" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#173328">Object Storage</text>

  <line x1="260" y1="230" x2="340" y2="230" stroke="#355949" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="235" x2="680" y2="235" stroke="#355949" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="960" y1="220" x2="1040" y2="220" stroke="#355949" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="960" y1="300" x2="1040" y2="470" stroke="#6d8579" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="470" y1="340" x2="470" y2="460" stroke="#6d8579" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="820" y1="340" x2="820" y2="460" stroke="#6d8579" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1040" y1="600" x2="960" y2="600" stroke="#6d8579" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="340" y1="600" x2="220" y2="600" stroke="#6d8579" stroke-width="3"/>
  <line x1="220" y1="600" x2="220" y2="280" stroke="#6d8579" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="80" y="790" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#557063">
    Flow: User interacts with the frontend, the backend validates uploads and routes processing to Modal or the local fallback,
  </text>
  <text x="80" y="815" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#557063">
    and the generated artifacts are persisted and returned for visualization and download.
  </text>
</svg>
